name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project
        run: |
          rm -rf ios
          flutter create . --platforms=ios
          flutter pub get

      - name: Clean and Rewrite Podfile
        run: |
          cd ios
          # غادي نمسحو الملف القديم ونكتبو واحد جديد نقي
          rm Podfile
          cat <<EOF > Podfile
          platform :ios, '13.0'

          # هادي هي الدالة اللي كتحكم فـ الـ Plugins
          def flutter_install_all_ios_pods(main_target_path)
            return unless File.exist?(main_target_path)
            pod 'Flutter', :path => 'Flutter'
          end

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          # هنا درنا post_install واحدة جامعة كولشي
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['EXPANDED_CODE_SIGN_STYLE'] = 'Manual'
              end
            end
          end
          EOF
          
          # دابا غادي نديرو تثبيت حقيقي للـ Plugins
          pod install
          cd ..

      - name: Build iOS Simulator Debug
        run: |
          flutter build ios --simulator --debug --no-codesign

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload
          rm -f app-debug.ipa
          mkdir -p Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
