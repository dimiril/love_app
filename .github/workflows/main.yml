name: Flutter iOS IPA (Simulator/Debug)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure iOS platform exists
        run: flutter create --platforms=ios .

      - name: Build iOS for simulator
        run: flutter build ios --simulator

      - name: Create IPA (from simulator build)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          zip -r app-sim-debug.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-sim-debug-ipa
          path: app-sim-debug.ipa
