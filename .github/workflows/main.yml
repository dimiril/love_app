name: Flutter Build Android & iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        platform: [android, ios]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure platforms exist
        run: flutter create --platforms=android,ios .

      - name: Build iOS IPA
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --debug --no-codesign
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload
          zip -r app-debug.ipa Payload
          rm -rf Payload

      - name: Upload iOS IPA
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-ipa
          path: app-debug.ipa
