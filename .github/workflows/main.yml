name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project
        run: |
          rm -rf ios
          flutter create . --platforms=ios
          flutter pub get

      - name: Fix Bundle ID for Firebase
        # هاد الخطوة ضرورية حيت الـ Plist ديالك فيه id كيسالي بـ .quotes 
        # والـ App كيبني بـ .heartfelt. هاد التناقض كيدير شاشة بيضاء.
        run: |
          cd ios/Runner.xcodeproj
          sed -i '' 's/love.messages.romantic.whispers.heartfelt.heartfelt/love.messages.romantic.whispers.heartfelt.quotes/g' project.pbxproj
          cd ../..

      - name: Safe Podfile Injection
        run: |
          cd ios
          # تثبيت الـ Pods الأولي
          pod install
          
          # تعديل الإعدادات لتعطيل الـ Signing وتحديد النسخة
          sed -i '' '/target.build_configurations.each do |config|/a \
                config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                config.build_settings["ENABLE_BITCODE"] = "NO" \
                config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                config.build_settings["ONLY_ACTIVE_ARCH"] = "YES" ' Podfile
          
          # تحديث الـ Pods لتطبيق التعديلات
          pod update
          cd ..

      - name: Build iOS Simulator
        run: |
          # تنظيف وبناء نسخة المحاكي
          flutter clean
          flutter pub get
          flutter build ios --simulator --debug --no-codesign

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload app-debug.ipa
          mkdir -p Payload
          # التأكد من هز التطبيق من المسار الصحيح للـ Simulator
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -r build/ios/iphonesimulator/Runner.app Payload
          else
            cp -r build/ios/Debug-iphonesimulator/Runner.app Payload
          fi
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
