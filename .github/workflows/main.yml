name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS and Fix Headers
        run: |
          # 1. تنظيف شامل ومسح الـ Pods القديمة
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          
          # 2. إعادة بناء ملفات الـ iOS
          rm -rf ios
          flutter create . --platforms=ios --org love.messages.romantic.whispers.heartfelt
          
          # 3. توحيد الـ Bundle ID مع Firebase
          find ios -name "project.pbxproj" -exec sed -i '' 's/love.messages.romantic.whispers.heartfelt.heartfelt/love.messages.romantic.whispers.heartfelt.quotes/g' {} +

      - name: Advanced Podfile Injection
        run: |
          cd ios
          # تثبيت الـ Pods الأساسي لتوليد الـ Frameworks
          pod install
          
          # هاد السكريبت كيمسح الـ post_install القديم وكيدير واحد جديد
          # كيجبر كاع الـ Plugins يشوفو الـ Flutter Header
          sed -i '' '/post_install do |installer|/,$d' Podfile
          
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                # حل مشكل 'Flutter/Flutter.h' file not found
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                config.build_settings['ONLY_ACTIVE_ARCH'] = 'YES'
              end
            end
          end
          EOF
          
          pod update
          cd ..

      - name: Build for Simulator
        run: |
          # استعمال verbose مهم هنا باش يبان لينا فين واقف Xcode بالضبط
          flutter build ios --simulator --debug --no-codesign

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload app-debug.ipa
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -r build/ios/iphonesimulator/Runner.app Payload
          else
            cp -r build/ios/Debug-iphonesimulator/Runner.app Payload
          fi
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
