name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project
        run: |
          rm -rf ios
          flutter create .

      - name: Ensure minimal podhelper.rb
        run: |
          mkdir -p ios/Flutter
          printf "require 'fileutils'\ndef install_all_flutter_pods(path = nil); end\ndef flutter_root; ENV['FLUTTER_ROOT']; end" > ios/Flutter/podhelper.rb

      - name: Build iOS Simulator IPA
        run: |
          flutter build ios --simulator --release --no-codesign

      - name: Create IPA for Appetize
        run: |
          rm -f app-debug.ipa
          rm -rf Payload
          mkdir Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
          if-no-files-found: warn
