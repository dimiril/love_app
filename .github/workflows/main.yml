name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project properly
        run: |
          # مسح شامل لضمان ملفات نقية
          rm -rf ios
          flutter create . --platforms=ios
          flutter pub get

      - name: Unified Podfile Configuration
        run: |
          cd ios
          # هاد السطر كيمسح أي post_install قديم كاين فـ الملف باش ما يوقعش Conflict
          sed -i '' '/post_install do |installer|/,$d' Podfile
          
          # دابا كنضيفو post_install وحدة جامعة لكلشي
          cat <<EOF >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['EXPANDED_CODE_SIGN_STYLE'] = 'Manual'
              end
            end
          end
          EOF
          
          # تثبيت الـ Pods (Firebase, Google SignIn, etc)
          pod install
          cd ..

      - name: Build iOS Simulator
        run: |
          # بناء نسخة المحاكي بلا توقيع الكود
          flutter build ios --simulator --debug --no-codesign

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload app-debug.ipa
          mkdir -p Payload
          # كنهزو التطبيق من المسار الصحيح
          cp -r build/ios/iphonesimulator/Runner.app Payload
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
