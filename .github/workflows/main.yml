name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project
        run: |
          rm -rf ios
          flutter create . --platforms=ios
          flutter pub get

      - name: Configure Podfile for No-Sign Build
        run: |
          cd ios
          # هاد الكود كيخلي الـ Plugins يتجمعوا بلا ما يحتاجو حساب Apple Developer
          # وكيحل مشكل الشاشة البيضاء حيت كيخلي الـ Native Code يخدم
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              end
            end
          end" >> Podfile
          # تثبيت الـ Pods ضروري باش الـ Firebase يخدم
          pod install
          cd ..

      - name: Build iOS Simulator Debug
        run: |
          # بناء التطبيق للمحاكي مع تفعيل الـ Plugins
          flutter build ios --simulator --debug --no-codesign

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload
          rm -f app-debug.ipa
          mkdir -p Payload
          # كنهزو النسخة اللي فيها كاع الـ Frameworks والـ Plugins
          cp -r build/ios/iphonesimulator/Runner.app Payload
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
