name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean and Reconstruct iOS Project
        run: |
          # 1. تنظيف عميق للمشروع
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ios/Flutter/Flutter.podspec
          
          # 2. إعادة إنشاء ملفات iOS من جديد لضمان المسارات الصحيحة
          rm -rf ios
          flutter create . --platforms=ios --org love.messages.romantic.whispers.heartfelt
          
          # 3. تعديل الـ Bundle ID ليتوافق مع Firebase
          find ios -name "project.pbxproj" -exec sed -i '' 's/love.messages.romantic.whispers.heartfelt.heartfelt/love.messages.romantic.whispers.heartfelt.quotes/g' {} +

      - name: Fix Podfile and Build Settings
        run: |
          cd ios
          # تثبيت الـ Pods لأول مرة لتوليد الـ Frameworks
          pod install
          
          # مسح الـ post_install التلقائي وتعويضه بواحد قوي كيهنينا من الـ Signing والـ Modules
          sed -i '' '/post_install do |installer|/,$d' Podfile
          
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                # هاد السطر كيعالج مشكل No such module Flutter
                config.build_settings['FRAMEWORK_SEARCH_PATHS'] = '$(inherited) \$(PROJECT_DIR)/Flutter'
                config.build_settings['ONLY_ACTIVE_ARCH'] = 'YES'
              end
            end
          end
          EOF
          
          pod update
          cd ..

      - name: Build for Simulator
        run: |
          # استعمال --verbose باش نشوفو فين كيحصل Xcode بالضبط
          flutter build ios --simulator --debug --no-codesign --verbose

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload app-debug.ipa
          mkdir -p Payload
          # التأكد من هز الـ .app من المسار الصحيح
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -r build/ios/iphonesimulator/Runner.app Payload
          else
            cp -r build/ios/Debug-iphonesimulator/Runner.app Payload
          fi
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
