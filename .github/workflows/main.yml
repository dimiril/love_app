name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Recreate iOS & Fix Bundle ID
        run: |
          flutter clean
          rm -rf ios
          flutter create . --platforms=ios --org love.messages.romantic.whispers.heartfelt
          # توحيد الـ Bundle ID مع Firebase
          find ios -name "project.pbxproj" -exec sed -i '' 's/love.messages.romantic.whispers.heartfelt.heartfelt/love.messages.romantic.whispers.heartfelt.quotes/g' {} +

      - name: Install Pods & Fix Signing
        run: |
          cd ios
          pod install
          # تعطيل الـ Signing فـ الـ Pods والـ Runner
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end" >> Podfile
          pod update
          cd ..

      - name: Build for Simulator (All Architectures)
        run: |
          # بناء التطبيق للمحاكي مع تفعيل الـ Plugins
          flutter build ios --simulator --debug --no-codesign --verbose

      - name: Force Framework Embedding
        run: |
          # هاد الخطوة كتحل مشكل الشاشة الكحلة (كتأكد أن الـ Plugins مجمعين)
          cd build/ios/iphonesimulator/Runner.app
          mkdir -p Frameworks
          # كنهزو كاع الـ .framework اللي تصايبو فـ الـ Build وكنحطوهم لداخل
          find ../ -name "*.framework" -exec cp -R {} Frameworks/ \; 2>/dev/null || true
          cd ../../../..

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload app-debug.ipa
          mkdir -p Payload
          cp -R build/ios/iphonesimulator/Runner.app Payload
          # ضغط الملف بـ طريقة هادئة ومنظمة
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
