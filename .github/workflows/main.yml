name: Flutter iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project
        run: |
          rm -rf ios
          flutter create .

      - name: Ensure podhelper.rb exists
        run: |
          mkdir -p ios/Flutter
          if [ ! -f ios/Flutter/podhelper.rb ]; then
            echo "# Minimal podhelper.rb to satisfy pod install" > ios/Flutter/podhelper.rb
            echo "require 'fileutils'" >> ios/Flutter/podhelper.rb
            echo "" >> ios/Flutter/podhelper.rb
            echo "def install_all_flutter_pods(flutter_application_path = nil)" >> ios/Flutter/podhelper.rb
            echo "  # placeholder" >> ios/Flutter/podhelper.rb
            echo "end" >> ios/Flutter/podhelper.rb
            echo "" >> ios/Flutter/podhelper.rb
            echo "def flutter_root" >> ios/Flutter/podhelper.rb
            echo "  ENV['FLUTTER_ROOT']" >> ios/Flutter/podhelper.rb
            echo "end" >> ios/Flutter/podhelper.rb
          fi

      - name: Build iOS
        run: flutter build ios --debug --no-codesign

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload
          zip -r app-debug.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-ipa
          path: app-debug.ipa
