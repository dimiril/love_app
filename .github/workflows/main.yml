name: Flutter iOS IPA (Preserve Info.plist)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      # 🛡️ Backup original Info.plist
      - name: Backup Info.plist
        run: |
          mkdir -p ios_backup
          cp ios/Runner/Info.plist ios_backup/Info.plist || echo "No Info.plist found"

      # ❌ Do NOT delete ios/, just recreate missing files
      - name: Ensure iOS platform exists (create missing files)
        run: flutter create --platforms=ios .

      # 🛡️ Restore original Info.plist
      - name: Restore Info.plist
        run: cp ios_backup/Info.plist ios/Runner/Info.plist

      # 🔹 Build iOS Debug without codesign
      - name: Build iOS (Debug, No Codesign)
        run: flutter build ios --debug --no-codesign

      # 🔹 Create IPA
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-debug.ipa Payload
          rm -rf Payload

      # 🔹 Upload IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-ipa
          path: app-debug.ipa
