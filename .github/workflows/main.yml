name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project properly
        run: |
          # 1. مسح شامل وبناء نظيف
          rm -rf ios
          flutter create . --platforms=ios
          
          # 2. توليد الـ Podfile الأصلي
          flutter pub get
          
      - name: Secure Build and Fix Pods
        run: |
          cd ios
          # هاد السطر كيجبر الـ Xcode يلقى الـ Flutter Module
          pod install
          
          # دابا غانزيدو إعدادات الـ No-Sign بلا ما نمسحو الـ Hooks ديال Flutter
          # هادي هي الطريقة المضمونة باش ما يطراش ليك No such module Flutter
          cat <<EOF >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['EXPANDED_CODE_SIGN_STYLE'] = 'Manual'
              end
            end
          end
          EOF
          
          # إعادة التثبيت لتطبيق التعديلات
          pod install
          cd ..

      - name: Build iOS Simulator
        run: |
          # استعملنا verbose باش يبان لينا المشكل بالتفصيل إذا طرا
          flutter build ios --simulator --debug --no-codesign --verbose

      - name: Create IPA for Appetize
        run: |
          rm -rf Payload app-debug.ipa
          mkdir -p Payload
          # كنهزو التطبيق من المسار اللي كيحطو فيه Xcode فـ Simulator
          cp -r build/ios/iphonesimulator/Runner.app Payload
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
