name: Flutter iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure iOS platform exists without overwriting
        run: flutter create --platforms=ios .

      - name: Restore missing iOS helper files
        run: |
          if [ ! -f ios/Flutter/podhelper.rb ]; then
            mkdir -p ios/Flutter
            curl -o ios/Flutter/podhelper.rb https://raw.githubusercontent.com/flutter/flutter/master/packages/flutter_tools/templates/cocoapods/PodHelper.rb.tmpl
          fi

      - name: Build iOS
        run: flutter build ios --debug --no-codesign

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload
          zip -r app-debug.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-ipa
          path: app-debug.ipa
