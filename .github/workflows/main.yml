name: Flutter iOS Simulator IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS project
        run: |
          rm -rf ios
          flutter create . --platforms=ios

      - name: Fix Podhelper for YAML
        # هاد الطريقة بـ printf هي أضمن طريقة باش ما يطراش ليك خطأ Column 1
        run: |
          mkdir -p ios/Flutter
          printf "require 'fileutils'\ndef install_all_flutter_pods(path = nil); end\ndef flutter_root; ENV['FLUTTER_ROOT']; end" > ios/Flutter/podhelper.rb

      - name: Build iOS Simulator (x86_64)
        # زدنا x86_64 حيت Appetize كيبغي هاد النوع باش ما يعطيش Unexpected Error
        run: |
          flutter build ios --simulator --debug --no-codesign
          
      - name: Create IPA for Appetize
        run: |
          rm -rf Payload
          mkdir -p Payload
          # كنهزو التطبيق من ملف الـ Simulator
          cp -r build/ios/iphonesimulator/Runner.app Payload
          # تأكد من ضغط الملف بطريقة صحيحة
          zip -r app-debug.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-debug.ipa
