name: heartfelt
description: "A new Flutter project."
publish_to: 'none'

version: 2.0.0+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  sqflite: ^2.4.2
  path_provider: ^2.0.11
  path: ^1.8.3
  dio: ^5.5.0+1
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  google_sign_in: ^6.2.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  url_launcher: ^6.2.5
  video_player: ^2.5.0
  wakelock_plus: ^1.4.0
  cached_network_image: ^3.3.0
  video_thumbnail: ^0.5.6
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/l10n/
    - assets/database/love.db
    - assets/stickers/
    - assets/images/

  fonts:
    - family: Iconly
      fonts:
        - asset: assets/fonts/iconly.ttf
    - family: Kaff
      fonts:
        - asset: assets/fonts/29LT-Kaff.ttf
    - family: Kaff-Black
      fonts:
        - asset: assets/fonts/29LT-Kaff-Black.ttf
          weight: 900
    - family: Casablanca
      fonts:
        - asset: assets/fonts/hacen_casablanca.ttf
    - family: Tajawal
      fonts:
        - asset: assets/fonts/tajawal.ttf
    - family: Jazeera
      fonts:
        - asset: assets/fonts/jazeera.ttf
    - family: Vibes
      fonts:
        - asset: assets/fonts/vibes.ttf
    - family: Navis
      fonts:
        - asset: assets/fonts/navis.ttf
    - family: Ziba
      fonts:
        - asset: assets/fonts/ziba.ttf
    - family: STC
      fonts:
        - asset: assets/fonts/stc_bold.ttf
          weight: 700
    - family: F105
      fonts:
        - asset: assets/fonts/f105.ttf
    - family: Font2
      fonts:
        - asset: assets/fonts/font2.otf
