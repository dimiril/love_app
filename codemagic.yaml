workflows:
  ios-debug-build:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2 # استعملنا M2 حيت هي اللي فيها Xcode الجديد
    environment:
      flutter: 3.23.1
      xcode: latest         # هادي غاتهنيك من مشكل Version unsupported
      cocoapods: default
    scripts:
      - name: Clean and Get Packages
        script: | 
          flutter clean
          flutter pub get
      - name: Prepare iOS Pods
        script: |
          cd ios
          # مسح شامل لأي ملفات قديمة جاية من الويندوز
          rm -rf Pods
          rm -rf build
          rm -f Podfile.lock
          # تثبيت الـ Pods من جديد وسط الماك
          pod install --repo-update
      - name: Build iOS Debug
        script: |
          # البناء باستعمال Xcode الجديد
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app