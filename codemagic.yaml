workflows:
  flutter_ios_debug:
    name: Flutter iOS Debug IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Checkout code
        script: git checkout $CM_BRANCH

      - name: Install dependencies
        script: flutter pub get

      - name: Backup Info.plist
        script: |
          if [ -f ios/Runner/Info.plist ]; then
            mkdir -p ios_backup
            cp ios/Runner/Info.plist ios_backup/Info.plist
          fi

      - name: Recreate iOS project
        script: |
          rm -rf ios
          flutter create .

          # Restore original Info.plist if exists
          if [ -f ios_backup/Info.plist ]; then
            cp ios_backup/Info.plist ios/Runner/Info.plist
          fi

- name: Ensure podhelper.rb exists
        script: |
          mkdir -p ios/Flutter
          if [ ! -f ios/Flutter/podhelper.rb ]; then
            cat <<'EOF' > ios/Flutter/podhelper.rb
          # Minimal podhelper.rb to satisfy pod install
          require 'fileutils'

          def install_all_flutter_pods(flutter_application_path = nil)
            # placeholder
          end

          def flutter_root
            ENV['FLUTTER_ROOT']
          end
          EOF
          fi
      - name: Build iOS (debug, no codesign)
        script: flutter build ios --debug --no-codesign

      - name: Create IPA
        script: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload
          zip -r app-debug.ipa Payload
          rm -rf Payload

    artifacts:
      - app-debug.ipa
