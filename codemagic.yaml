workflows:
  ios-debug-build:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean and Get Packages
        script: | 
          flutter clean
          flutter pub get
      - name: Prepare iOS Config & Pods
        script: |
          # 1. توليد ملفات الإعدادات (Generated.xcconfig & podhelper.rb)
          flutter build ios --config-only
          
          # 2. تنظيف وتثبيت الـ Pods
          cd ios
          rm -rf Pods
          rm -rf build
          rm -f Podfile.lock
          pod install --repo-update
          cd ..
      - name: Build iOS Debug
        script: |
          # 3. البناء النهائي
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app