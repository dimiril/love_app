workflows:
  ios-debug-build:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable      # هادي غاتهنيك، غايجيب آخر نسخة مستقرة (3.24 أو 3.27...)
      xcode: latest        # باش يخدم مع Firebase و Swift الجديد
      cocoapods: default
    scripts:
      - name: Clean and Get Packages
        script: | 
          flutter clean
          flutter pub get
      - name: Prepare iOS Pods
        script: |
          cd ios
          # مسح شامل لأي صداع من الويندوز
          rm -rf Pods
          rm -rf build
          rm -f Podfile.lock
          # تحديث الـ Repos وتثبيت الـ Pods
          pod install --repo-update
      - name: Build iOS Debug
        script: |
          # البناء باستعمال Xcode الجديد
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app