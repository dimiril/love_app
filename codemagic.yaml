workflows:
  flutter_ios_debug:
    name: Flutter iOS Simulator Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Checkout code
        script: git checkout $CM_BRANCH

      - name: Install dependencies
        script: flutter pub get

      - name: Recreate iOS project
        script: |
          rm -rf ios
          flutter create .

      - name: Ensure podhelper.rb exists
        script: |
          mkdir -p ios/Flutter
          # ركز هنا: الكود اللي لتحت خاصو يكون محاذي لـ mkdir
          if [ ! -f ios/Flutter/podhelper.rb ]; then
            cat <<'EOF' > ios/Flutter/podhelper.rb
          require 'fileutils'
          def install_all_flutter_pods(flutter_application_path = nil)
            # placeholder
          end
          def flutter_root
            ENV['FLUTTER_ROOT']
          end
          EOF
          fi
      - name: Build for Simulator
        script: |
          # هاد السطر هو الأهم: كيبني النسخة اللي كيقبلها Appetize
          flutter build ios --debug --simulator --no-codesign

      - name: Package for Appetize
        script: |
          mkdir -p Payload
          # ركز هنا: المسار تبدل لـ iphonesimulator
          cp -r build/ios/iphonesimulator/Runner.app Payload
          zip -r app-debug.ipa Payload

    artifacts:
      - app-debug.ipa
